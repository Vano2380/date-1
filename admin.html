<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊Панель ответов </title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>📊 Полученные ответы</h1>
            <p class="subtitle">Все ответы на твое приглашение</p>
            <div class="header-actions">
                <button onclick="refreshAnswers()" class="btn btn-refresh">🔄 Обновить</button>
                <button onclick="clearAllAnswers()" class="btn btn-clear">🗑️ Очистить все</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalAnswers">0</div>
                <div class="stat-label">Всего ответов</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="yesAnswers">0</div>
                <div class="stat-label">Ответов "Да"</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="lastAnswer">—</div>
                <div class="stat-label">Последний ответ</div>
            </div>
        </div>

        <div id="answersContainer" class="answers-container">
            <div class="no-answers">
                <div class="empty-icon">📭</div>
                <p>Пока нет ответов</p>
                <p class="hint">Ответы будут появляться здесь автоматически</p>
            </div>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
